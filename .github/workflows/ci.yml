name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm install

      - name: Run ESLint
        run: cd dashboard && npm run lint

      - name: Build dashboard
        run: cd dashboard && npm run build

  build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [lint, test, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy with rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/openwa

            # ── 1. Snapshot current state for rollback ──────────────
            PREV_SHA=$(git rev-parse HEAD)
            PREV_IMAGE=$(docker inspect openwa-api --format='{{.Image}}' 2>/dev/null || echo "")
            echo "Current SHA: $PREV_SHA"

            # ── 2. Backup database before deploying ─────────────────
            echo "Running database backup..."
            bash scripts/backup-postgres.sh >> backups/backup.log 2>&1 || echo "Backup warning (non-fatal)"

            # ── 3. Pull latest code ──────────────────────────────────
            git pull origin main

            # ── 4. Rebuild and restart API ───────────────────────────
            docker compose build openwa-api
            docker compose up -d --force-recreate openwa-api

            # ── 5. Build and deploy dashboard ────────────────────────
            cd dashboard
            npm ci --prefer-offline
            npm run build
            cd ..
            sudo /opt/openwa/scripts/deploy-dashboard.sh

            # ── 6. Health check ──────────────────────────────────────
            echo "Waiting for API to be ready..."
            for i in $(seq 1 12); do
              if curl -sf https://api.noor-boutique.com/api/infra/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}×5s"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "Health check FAILED — rolling back..."
                git reset --hard "$PREV_SHA"
                if [ -n "$PREV_IMAGE" ]; then
                  docker run -d --name openwa-api-rollback "$PREV_IMAGE" || true
                fi
                docker compose up -d --force-recreate openwa-api
                exit 1
              fi
              sleep 5
            done

            echo "Deploy complete ✓  SHA: $(git rev-parse HEAD)"
