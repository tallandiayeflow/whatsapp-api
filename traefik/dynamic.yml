# Traefik Dynamic Configuration
http:
  routers:
    # Redirect HTTP → HTTPS handled by entryPoint redirections in traefik.yml

    # API Router
    api:
      rule: 'PathPrefix(`/api/`)'
      entryPoints:
        - websecure
      service: api
      priority: 100
      tls:
        certResolver: letsencrypt

    # WebSocket Router
    websocket:
      rule: 'PathPrefix(`/socket.io`)'
      entryPoints:
        - websecure
      service: api
      priority: 100
      tls:
        certResolver: letsencrypt

  services:
    api:
      loadBalancer:
        servers:
          - url: 'http://openwa-api:2785'
